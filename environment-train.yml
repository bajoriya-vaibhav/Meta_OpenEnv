name: chronoveritas-train
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # ── PyTorch + CUDA 12.1 ───────────────────────────────────────────────────
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.4.0+cu121
    - torchvision==0.19.0+cu121
    - torchaudio==2.4.0+cu121

    # ── Training Stack ────────────────────────────────────────────────────────
    # NOTE: These exact versions are pinned — do NOT bump independently.
    # The intersection of unsloth 2025.3.x + trl 0.14.x + transformers 4.47.x
    # is the only set that satisfies all three on torch 2.4.0+cu121.
    - unsloth==2025.3.19        # 2x faster GRPO (requires unsloth_zoo)
    - unsloth_zoo==2025.3.17    # companion package required by unsloth>=2025.x
    - trl==0.14.0               # first stable release with GRPOTrainer
    - peft==0.14.0              # LoRA adapters (compatible with trl 0.14)
    - accelerate==1.4.0         # PINNED: >=1.1.0 for SFTConfig.data_seed; <1.5.x avoids
    #   FP8BackendType cache-mismatch bug with unsloth 2025.3.x. If you change
    #   this version, delete unsloth_compiled_cache/ so it regenerates cleanly.
    - transformers==4.47.1      # huggingface_hub <1.0 required by this version
    - tokenizers==0.21.4        # required by transformers 4.47.x
    - huggingface_hub==0.36.2   # must be <1.0 for transformers 4.47.x
    - rich>=13.0                # required by trl.trainer.utils
    - bitsandbytes>=0.43.3      # QLoRA 4-bit
    # torchao must NOT be installed — torchao>=0.5 requires torch>=2.6 (torch.int1)
    # but we run torch==2.4.0+cu121. peft's LoRA dispatcher crashes on import.
    # We use bitsandbytes for 4-bit quantization instead.
    - datasets==4.3.0
    - sentencepiece==0.2.0
    - wandb==0.17.7

    # ── Core dependencies (Shared) ────────────────────────────────────────────
    - fastapi==0.112.0
    - uvicorn[standard]==0.30.5
    - httpx==0.27.0
    - openai==1.41.0
    - networkx==3.3
    - scipy==1.14.0
    - numpy==1.26.4
    - pandas==2.2.2
    - scikit-learn==1.5.1
    - tqdm==4.66.4
    - requests==2.32.3
    - python-dotenv==1.0.1
    - python-multipart==0.0.9

    # ── Search & Vision & Embeddings ──────────────────────────────────────────
    - sentence-transformers==3.0.1
    - rank-bm25==0.2.2
    - faiss-cpu==1.8.0
    - open-clip-torch==2.26.1
    - imagehash==4.3.1
    - Pillow==10.4.0
    - tavily-python==0.3.9
    - firecrawl-py==1.2.3
    - groq==0.11.0
    - google-generativeai==0.7.2

    # ── Testing & Plotting ────────────────────────────────────────────────────
    - matplotlib==3.9.2
    - seaborn==0.13.2
    - pytest==8.3.2
    - pytest-asyncio==0.23.8
