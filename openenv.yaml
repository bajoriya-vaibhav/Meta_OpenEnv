name: chronoveritas-ma
version: "2.1.0"
description: >
  Multi-agent misinformation forensics environment. Three role agents cooperate
  under partial observability: Retriever searches and fetches evidence, Analyst
  reconstructs contradictions and mutation hypotheses, and Arbiter requests
  missing evidence before submitting the final deterministic audit verdict.
author: chronoveritas-team
theme: multi-agent-interactions

agent_roles:
  - retriever
  - analyst
  - arbiter

actions:
  - name: search
    description: Retriever performs BM25 keyword search over the document corpus
  - name: fetch_doc
    description: Retriever retrieves full document content
  - name: request_evidence
    description: Analyst or Arbiter requests a query/doc from the Retriever
  - name: send_message
    description: Role agents exchange structured messages on the shared blackboard
  - name: update_hypothesis
    description: Analyst or Arbiter updates a local mutation hypothesis
  - name: add_timeline_event
    description: Analyst annotates chronological evidence
  - name: flag_contradiction
    description: Analyst marks two fetched documents as contradictory
  - name: set_mutation_point
    description: Declares a mutation hypothesis without ground-truth reward leakage
  - name: submit_verdict
    description: Terminal Arbiter action that triggers deterministic grading

observations:
  default:
    description: Full shared blackboard state for backward-compatible single-agent use
  role_filtered:
    endpoint: /state/{role}
    description: Partial observation for retriever, analyst, or arbiter training

difficulty_levels:
  - easy:   { max_steps: 15, corpus_size: 4 }
  - medium: { max_steps: 20, corpus_size: 8 }
  - hard:   { max_steps: 30, corpus_size: 20 }

reward:
  type: deterministic
  terminal_grader: unified_grader
  components:
    - verdict
    - mutation_type
    - mutation_point
    - provenance
    - source_reliability
    - timeline
    - efficiency
    - early_detection
    - reconciliation
    - calibration
  shaping:
    type: potential_based
    leakage: none
    observable_terms:
      - exploration
      - authority
      - contradiction_density
      - hypothesis_grounding
      - evidence_coherence
      - coordination
  penalties:
    - hallucination
    - brier
    - duplicate_request_spam
  leakage: none

training:
  algorithm: SFT warm start + GRPO proxy
  base_model: Qwen/Qwen2.5-7B-Instruct
  framework: unsloth + trl

tasks:
  - id: EASY-001
    difficulty: easy
    max_steps: 15
  - id: MED-001
    difficulty: medium
    max_steps: 20
  - id: HARD-001
    difficulty: hard
    max_steps: 30

reward_range: [-0.20, 1.0]
episode_terminates_on:
  - submit_verdict
  - step_budget_exceeded
