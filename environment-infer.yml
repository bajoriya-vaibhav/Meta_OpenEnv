name: chronoveritas-infer
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # ── PyTorch + CUDA 12.1 ───────────────────────────────────────────────────
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.4.0+cu121
    - torchvision==0.19.0+cu121
    - torchaudio==2.4.0+cu121

    # ── vLLM & Quantization (Inference Stack) ─────────────────────────────────
    - vllm==0.6.3
    - autoawq==0.2.7.post3     # AWQ 4-bit
    - auto-gptq==0.7.1         # GPTQ 4-bit
    - optimum>=1.22.0

    # ── Core dependencies (Shared) ────────────────────────────────────────────
    - fastapi==0.112.0
    - uvicorn[standard]==0.30.5
    - httpx==0.27.0
    - openai==1.41.0
    - networkx==3.3
    - scipy==1.14.0
    - numpy==1.26.4
    - pandas==2.2.2
    - scikit-learn==1.5.1
    - tqdm==4.66.4
    - requests==2.32.3
    - python-dotenv==1.0.1
    - python-multipart==0.0.9

    # ── Search & Vision & Embeddings ──────────────────────────────────────────
    - sentence-transformers==3.0.1
    - rank-bm25==0.2.2
    - faiss-cpu==1.8.0
    - open-clip-torch==2.26.1
    - imagehash==4.3.1
    - Pillow==10.4.0
    - tavily-python==0.3.9
    - firecrawl-py==1.2.3
    - groq==0.11.0
    - google-generativeai==0.7.2

    # ── Testing & Plotting ────────────────────────────────────────────────────
    - matplotlib==3.9.2
    - seaborn==0.13.2
    - pytest==8.3.2
    - pytest-asyncio==0.23.8
